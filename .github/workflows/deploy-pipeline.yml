name: Deployment Pipeline

on:
  push:
    branches: [main]

jobs:
  # First phase: Test
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2
      
      - name: Run unit tests
        run: |
          echo "Running tests..."
          echo "All tests passed! ✅"
  
  # Second phase: Build (only if tests pass)
  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4.2
      
      - name: Build application
        run: |
          echo "Building application..."
          echo "Build complete! 📦"
      
      # Save build artifact for later jobs
      - name: Upload build artifact
        uses: actions/upload-artifact@v3
        with:
          name: my-app-build
          path: .
  
  # Third phase: Deploy to staging
  deploy-staging:
    runs-on: ubuntu-latest
    needs: build
    environment: staging
    steps:
      - name: Download build
        uses: actions/download-artifact@v3
        with:
          name: my-app-build
      
      - name: Deploy to staging
        run: |
          echo "Deploying to staging server..."
          echo "Staging deployment complete! 🚀"
  
  # Fourth phase: Integration tests on staging
  integration-tests:
    runs-on: ubuntu-latest
    needs: deploy-staging
    steps:
      - name: Run integration tests
        run: |
          echo "Testing on staging environment..."
          echo "All integration tests passed! ✅"
  
  # Fifth phase: Manual approval for production
  wait-for-approval:
    runs-on: ubuntu-latest
    needs: integration-tests
    environment: production
    steps:
      - name: Waiting for approval
        run: |
          echo "Waiting for manual approval..."
          echo "Check the 'production' environment in GitHub"
  
  # Sixth phase: Deploy to production
  deploy-production:
    runs-on: ubuntu-latest
    needs: wait-for-approval
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Deploy to production
        run: |
          echo "Deploying to production servers..."
          echo "Production deployment complete! 🎉"