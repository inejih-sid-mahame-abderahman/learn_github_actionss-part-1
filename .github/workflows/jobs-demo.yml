name: Jobs Demo

on:
  workflow_dispatch:

jobs:
  # Job 1 - Runs immediately
  job-1:
    runs-on: ubuntu-latest
    steps:
      - name: Step 1 in Job 1
        run: echo "Job 1 - Step 1"
      
      - name: Step 2 in Job 1
        run: echo "Job 1 - Step 2"
      
      - name: Show job name
        run: echo "Current job: ${{ github.job }}"
  
  # Job 2 - Runs at the same time as Job 1 (parallel)
  job-2:
    runs-on: ubuntu-latest
    steps:
      - name: Job 2 running
        run: echo "Job 2 is running parallel to Job 1"
  
  # Job 3 - Waits for Job 1 to finish first
  job-3:
    runs-on: ubuntu-latest
    needs: job-1
    steps:
      - name: Job 3 running
        run: |
          echo "Job 3 runs only after Job 1 completes"
          echo "It can run parallel with Job 2 though"
  
  # Job 4 - Waits for multiple jobs
  job-4:
    runs-on: ubuntu-latest
    needs: [job-2, job-3]
    steps:
      - name: Job 4 running
        run: |
          echo "Job 4 waits for both Job 2 and Job 3"
          echo "Both must complete successfully first"