name: My First Workflow

on:
  push:
    branches:
      - main

jobs:
  say-hello:
    runs-on: ubuntu-latest
    steps:
      - name: Print Hello Message
        run: echo "Hello World! My first GitHub Action is working!"
  say-goodbye:
    runs-on: ubuntu-latest
    steps:
      - name: Print Goodbye Message
        run: echo "Goodbye World! My first GitHub Action is working!"
  say-github:
    runs-on: ubuntu-latest  
    steps:
      - name: Print GitHub Message
        run: echo "GitHub Actions are awesome! My first GitHub Action is working!"
